<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>UrriChat</title>

    <link rel="manifest" href="manifest.json">
    <meta name="theme-color" content="#0f0f12">
    <meta name="mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">

    <link rel="icon" href="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><circle cx=%2250%22 cy=%2250%22 r=%2248%22 fill=%22%23007bff%22/><path d=%22M30 35h40v25H45L30 75V35z%22 fill=%22white%22/></svg>">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <script src="https://www.gstatic.com/firebasejs/9.17.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.17.1/firebase-database-compat.js"></script>
    <style>
        /* --- ESTILOS BASE --- */
        * { 
            box-sizing: border-box; 
            -webkit-tap-highlight-color: transparent;
        } 
        
        html, body { 
            height: 100%; 
            width: 100%;
            margin: 0; 
            padding: 0; 
            overflow: hidden; /* Evita el scroll de toda la página */
            background: #0f0f12;
            color: white;
            font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            position: fixed; /* Bloquea el body para que el teclado no lo desplace */
        }

        #login, #contacts-container, #chat-container {
            display: none;
            width: 100%;
            height: 100%; 
            position: absolute;
            top: 0;
            left: 0;
            overflow: hidden;
        }

        #contacts-container, #chat-container { flex-direction: column; }

        /* Login */
        #login { display: flex; flex-direction: column; justify-content: center; align-items: center; gap: 25px; text-align: center; }
        .login-box {
            width: 85%; max-width: 380px; padding: 40px;
            background: rgba(26, 26, 32, 0.8); border: 1px solid rgba(255, 255, 255, 0.05);
            border-radius: 30px; box-shadow: 0 20px 40px rgba(0, 0, 0, 0.4); backdrop-filter: blur(10px);
        }

        #username, #password { 
            width: 100%; text-align: center; padding: 14px 20px; border-radius: 15px; 
            border: 2px solid #2c2c34; background: #0f0f12; color: white; font-size: 16px; margin-bottom: 15px;
        }

        #login-btn { width: 100%; padding: 14px; background: #007bff; color: white; border: none; border-radius: 15px; font-weight: 700; cursor: pointer; }

        /* Header */
        .header { 
            height: 65px; min-height: 65px; display: flex; justify-content: space-between; 
            align-items: center; padding: 0 15px; background: #1a1a20; border-bottom: 1px solid #333; 
            z-index: 100; flex-shrink: 0; 
        }

        /* Mensajes y Scroll */
        #messages, #lista-usuarios { 
            flex: 1; 
            overflow-y: auto; 
            padding: 15px 0; 
            display: flex; 
            flex-direction: column; 
            -webkit-overflow-scrolling: touch; 
        }

        .msg-container { display: flex; width: 100%; padding: 2px 15px; margin-bottom: 8px; transition: background 0.3s; position: relative; }
        .msg-container.selected { background: rgba(0, 123, 255, 0.2); }
        .msg-container.me { justify-content: flex-end; }
        .msg-container.other { justify-content: flex-start; }

        .msg { padding: 8px 12px; border-radius: 15px; max-width: 85%; position: relative; display: inline-block; word-wrap: break-word; cursor: pointer; user-select: none; }
        .msg.me { background: #007bff; border-bottom-right-radius: 2px; color: white; }
        .msg.other { background: #2c2c34; border-bottom-left-radius: 2px; color: white; }

        .reply-box { background: rgba(0,0,0,0.2); border-left: 4px solid #007bff; padding: 5px 8px; border-radius: 5px; margin-bottom: 5px; font-size: 12px; }
        #reply-preview { display: none; background: #1a1a20; padding: 10px 15px; border-top: 1px solid #333; position: relative; }

        /* Input Area */
        .input-area { padding: 10px 12px; padding-bottom: calc(10px + env(safe-area-inset-bottom)); background: #1a1a20; display: flex; gap: 10px; align-items: center; border-top: 1px solid #333; flex-shrink: 0; }
        textarea#msg-input { flex: 1; padding: 10px 15px; border-radius: 22px; border: none; background: #2c2c34; color: white; outline: none; resize: none; font-size: 16px; max-height: 120px; line-height: 1.3; }
        .footer-btn { background: transparent; border: none; color: #007bff; font-size: 1.4rem; cursor: pointer; display: flex; align-items: center; justify-content: center; min-width: 30px; }
        button#main-btn { width: 45px; height: 45px; background: #007bff; color: white; border: none; border-radius: 50%; cursor: pointer; display: flex; align-items: center; justify-content: center; flex-shrink: 0; }

        /* Contactos */
        .contact-card { background: #1a1a20; padding: 15px; margin: 10px; border-radius: 12px; border: 1px solid #333; display: flex; align-items: center; justify-content: space-between; }
        .unread-badge { background: #007bff; color: white; font-size: 10px; padding: 2px 7px; border-radius: 10px; font-weight: bold; margin-right: 12px; }
        .online-dot { height: 10px; width: 10px; border-radius: 50%; display: inline-block; }
        .dot-online { background-color: #2ecc71; }
        .dot-offline { background-color: #ff4444; }

        /* Otros */
        #reaction-selector { display: none; position: fixed; background: #1a1a20; border: 1px solid #333; padding: 10px; border-radius: 15px; z-index: 2000; grid-template-columns: repeat(5, 1fr); gap: 12px; box-shadow: 0 5px 25px rgba(0,0,0,0.9); }
        .emoji-item { cursor: pointer; font-size: 1.3rem; text-align: center; }
        .emoji-picker { display: none; position: absolute; bottom: 75px; left: 10px; background: #1a1a20; border: 1px solid #333; padding: 10px; border-radius: 15px; grid-template-columns: repeat(5, 1fr); gap: 8px; z-index: 100; }
        .status-info { display: flex; align-items: center; justify-content: flex-end; gap: 4px; margin-top: 4px; font-size: 10px; opacity: 0.7; }
        .btn-header { background: transparent; color: #007bff; border: 1px solid #007bff; padding: 6px 10px; border-radius: 8px; font-size: 14px; }
        #scroll-down { position: fixed; bottom: 90px; right: 20px; background: #007bff; color: white; width: 35px; height: 35px; border-radius: 50%; display: none; align-items: center; justify-content: center; border: none; z-index: 90; }
        
        #header-status-dot { width: 8px; height: 8px; border-radius: 50%; display: inline-block; margin-right: 4px; }
    </style>
</head>
<body onclick="cerrarSelectores()">

    <div id="login">
        <div class="login-box">
            <i class="fas fa-comments" style="font-size: 4.5rem; color: #007bff; margin-bottom: 10px;"></i>
            <h1 style="color: #007bff; font-size: 2.8rem; margin: 0;">UrriChat</h1>
            <p style="color: #888; margin-bottom: 25px;">Tu chat favorito</p>
            <input type="text" id="username" placeholder="Usuario..." autocomplete="off">
            <input type="password" id="password" placeholder="Contraseña..." autocomplete="off">
            <button id="login-btn" onclick="registrarUsuario()">Conectar <i class="fas fa-arrow-right"></i></button>
        </div>
    </div>

    <div id="contacts-container">
        <div class="header">
            <span id="mi-perfil" style="font-weight: bold; color: #2ecc71;"></span>
            <div style="display: flex; gap: 8px;">
                <button class="btn-header" onclick="editarNombre()"><i class="fas fa-user-edit"></i></button>
                <button class="btn-header" style="color:#ff4444; border-color:#ff4444" onclick="confirmarSalida()"><i class="fas fa-sign-out-alt"></i></button>
            </div>
        </div>
        <div id="lista-usuarios">
            <div class="contact-card" onclick="abrirChat('muro', 'Chat Grupal')" style="border-left: 5px solid #007bff;">
                <span><i class="fas fa-users" style="margin-right: 10px; color: #007bff;"></i> Chat Grupal</span>
                <div style="display:flex; align-items:center;">
                    <span id="badge-muro"></span>
                    <span class="online-dot dot-online"></span>
                </div>
            </div>
            <p style="color: #666; font-size: 14px; margin: 15px;">Usuarios De UrriChat</p>
            <div id="usuarios-conectados"></div>
        </div>
    </div>

    <div id="chat-container">
        <div class="header" id="chat-header-normal">
            <button class="btn-header" onclick="volverAContactos()"><i class="fas fa-chevron-left"></i></button>
            <div style="text-align: center;">
                <span id="chat-title" style="font-weight: bold; display: block;">Chat</span>
                <div id="chat-header-status" style="font-size: 10px; display: flex; align-items: center; justify-content: center; gap: 2px;">
                    <span id="header-status-dot"></span>
                    <span id="header-status-text"></span>
                </div>
                <span id="chat-subtitle" style="font-size: 10px; color: #2ecc71; display: none;">Escribiendo...</span>
            </div>
            <button class="btn-header" style="color:#ff4444; border-color:#ff4444" onclick="vaciarChat()"><i class="fas fa-trash-alt"></i></button>
        </div>

        <div class="header" id="chat-header-selection" style="display: none;">
            <div style="display: flex; align-items: center; gap: 15px;">
                <button class="footer-btn" onclick="cancelarSeleccion()"><i class="fas fa-times"></i></button>
                <span id="selection-count" style="font-weight: bold; color: #007bff;">1</span>
            </div>
            <div style="display: flex; gap: 12px;">
                <button id="reply-btn-header" class="btn-header" onclick="prepararRespuesta()"><i class="fas fa-reply"></i></button>
                <button class="btn-header" style="color: #ff4444; border-color: #ff4444;" onclick="borrarMensajesSeleccionados()"><i class="fas fa-trash-alt"></i></button>
            </div>
        </div>

        <div id="messages" onscroll="handleScroll(this)"></div>
        <button id="scroll-down" onclick="scrollToBottom()"><i class="fas fa-chevron-down"></i></button>

        <div id="reply-preview">
            <div class="reply-box">
                <div style="display: flex; justify-content: space-between; align-items: center;">
                    <strong id="reply-user" style="color: #007bff;"></strong>
                    <i class="fas fa-times" onclick="cancelarRespuesta()"></i>
                </div>
                <p id="reply-text" style="white-space: nowrap; overflow: hidden; text-overflow: ellipsis;"></p>
            </div>
        </div>

        <div class="input-area">
            <div id="emoji-picker" class="emoji-picker" onclick="event.stopPropagation()">
                <span class="emoji-item" onclick="addEmoji('😊')">😊</span>
                <span class="emoji-item" onclick="addEmoji('😂')">😂</span>
                <span class="emoji-item" onclick="addEmoji('❤️')">❤️</span>
                <span class="emoji-item" onclick="addEmoji('👍')">👍</span>
                <span class="emoji-item" onclick="addEmoji('🔥')">🔥</span>
                <span class="emoji-item" onclick="addEmoji('😮')">😮</span>
                <span class="emoji-item" onclick="addEmoji('😢')">😢</span>
                <span class="emoji-item" onclick="addEmoji('👏')">👏</span>
                <span class="emoji-item" onclick="addEmoji('😎')">😎</span>
                <span class="emoji-item" onclick="addEmoji('🎉')">🎉</span>
            </div>
            <button class="footer-btn" onclick="toggleEmojiPicker(event)"><i class="far fa-smile"></i></button>
            <input type="file" id="file-input" style="display:none" onchange="enviarArchivo(this)">
            <button class="footer-btn" onclick="document.getElementById('file-input').click()"><i class="fas fa-paperclip"></i></button>
            <button class="footer-btn" id="mic-btn" onclick="toggleAudio()"><i class="fas fa-microphone"></i></button>
            <textarea id="msg-input" placeholder="Mensaje..." rows="1" oninput="autoResize(this)"></textarea>
            <button id="main-btn" onclick="enviar()"><i class="fas fa-paper-plane"></i></button>
        </div>
    </div>

    <div id="reaction-selector" onclick="event.stopPropagation()">
        <span class="emoji-item" onclick="aplicarReaccion('😊')">😊</span>
        <span class="emoji-item" onclick="aplicarReaccion('😂')">😂</span>
        <span class="emoji-item" onclick="aplicarReaccion('❤️')">❤️</span>
        <span class="emoji-item" onclick="aplicarReaccion('👍')">👍</span>
        <span class="emoji-item" onclick="aplicarReaccion('🔥')">🔥</span>
    </div>

    <script>
        // --- CONFIGURACIÓN FIREBASE ---
        const firebaseConfig = {
            apiKey: "AIzaSyA7XKmn8f1w6hAVUZaS8Eui7FAnZRy0Myg",
            authDomain: "urrichatapp.firebaseapp.com",
            databaseURL: "https://urrichatapp-default-rtdb.firebaseio.com",
            projectId: "urrichatapp",
            storageBucket: "urrichatapp.firebasestorage.app",
            messagingSenderId: "504734750650",
            appId: "1:504734750650:web:51a8def62934aabbeb2f83"
        };
        firebase.initializeApp(firebaseConfig);
        const db = firebase.database();

        let usuarioActual = "";
        let salaActual = "";
        let typingTimeout, mediaRecorder, audioChunks = [], isRecording = false;
        let msgIdParaReaccionar = "";
        let mensajesSeleccionados = [];
        let mensajeParaResponder = null;
        let pressTimer;

        // --- SOLUCIÓN PARA EL TECLADO (Visual Viewport API) ---
        function fixViewport() {
            const vv = window.visualViewport;
            const containers = [document.getElementById('login'), document.getElementById('contacts-container'), document.getElementById('chat-container')];
            
            function onResize() {
                const height = vv.height;
                containers.forEach(c => {
                    if (c.style.display === 'flex') {
                        c.style.height = height + 'px';
                    }
                });
                // Al abrir teclado, bajamos scroll si estamos en chat
                if (salaActual) scrollToBottom();
            }

            vv.addEventListener('resize', onResize);
            onResize();
        }

        function scrollToBottom() {
            const box = document.getElementById("messages");
            box.scrollTo({ top: box.scrollHeight, behavior: 'smooth' });
        }

        function autoResize(textarea) {
            textarea.style.height = 'auto';
            textarea.style.height = (textarea.scrollHeight) + 'px';
            if (salaActual) db.ref(`typing/${salaActual}/${usuarioActual}`).set(true);
            clearTimeout(typingTimeout);
            typingTimeout = setTimeout(() => { if(salaActual) db.ref(`typing/${salaActual}/${usuarioActual}`).set(false); }, 1500);
        }

        function registrarUsuario(persistente) {
            let user = persistente || document.getElementById('username').value.trim();
            let pass = document.getElementById('password').value.trim();
            if (user) {
                if (persistente) { completarLogin(user); return; }
                if (!pass) { alert("Por favor, ingresa una contraseña"); return; }
                db.ref("credenciales/" + user).once("value", (snapshot) => {
                    if (snapshot.exists()) {
                        if (snapshot.val() === pass) completarLogin(user);
                        else alert("Contraseña incorrecta.");
                    } else {
                        db.ref("credenciales/" + user).set(pass);
                        completarLogin(user);
                    }
                });
            }
        }

        function completarLogin(user) {
            usuarioActual = user;
            localStorage.setItem('urrichat_user', user);
            document.getElementById('mi-perfil').innerText = "● " + user;
            
            const userRef = db.ref("usuarios/" + user);
            db.ref(".info/connected").on("value", (snap) => {
                if (snap.val() === true) { userRef.onDisconnect().set("offline"); userRef.set("online"); }
            });

            escucharUsuarios();
            const ultimaSala = localStorage.getItem('urrichat_last_room');
            const ultimoTitulo = localStorage.getItem('urrichat_last_title');

            document.getElementById('login').style.display = 'none';
            if (ultimaSala && ultimaSala !== 'contacts') {
                abrirChat(ultimaSala, ultimoTitulo);
            } else {
                document.getElementById('contacts-container').style.display = 'flex';
                localStorage.setItem('urrichat_last_room', 'contacts');
            }
            fixViewport();
        }

        function abrirChat(id, title) {
            salaActual = id;
            localStorage.setItem('urrichat_last_room', id);
            localStorage.setItem('urrichat_last_title', title);
            
            document.getElementById('contacts-container').style.display = 'none';
            document.getElementById('chat-container').style.display = 'flex';
            document.getElementById('chat-title').innerText = title;
            
            if (id !== 'muro') {
                db.ref("usuarios/" + title).on("value", (snap) => {
                    const dot = document.getElementById('header-status-dot');
                    const txt = document.getElementById('header-status-text');
                    const online = snap.val() === 'online';
                    dot.className = online ? 'dot-online' : 'dot-offline';
                    txt.innerText = online ? 'Conectado' : 'Desconectado';
                    txt.style.color = online ? '#2ecc71' : '#ff4444';
                });
            } else {
                document.getElementById('chat-header-status').style.display = 'none';
            }

            escucharMensajes();
            escucharEscritura();
            fixViewport();
        }

        function escucharMensajes() {
            db.ref(salaActual).on("value", (snap) => {
                const box = document.getElementById("messages");
                let html = "";
                snap.forEach(child => {
                    const d = child.val();
                    const esMio = d.u === usuarioActual;
                    
                    let replyHtml = d.reply ? `<div class="reply-box"><strong>${d.reply.u}</strong><br>${d.reply.t}</div>` : "";
                    let content = !esMio ? `<small style="color:#888; font-weight:bold;">${d.u}</small><br>` : "";
                    content += replyHtml + (d.t || "");
                    
                    if(d.file) {
                        if(d.fileType.includes("image")) content += `<img src="${d.file}" style="max-width:100%; border-radius:10px;">`;
                        else if(d.fileType.includes("audio")) content += `<audio controls src="${d.file}" style="width:200px;"></audio>`;
                    }

                    const isSelected = mensajesSeleccionados.includes(child.key) ? 'selected' : '';
                    html += `
                        <div class="msg-container ${esMio?'me':'other'} ${isSelected}" onclick="manejarClickMensaje('${child.key}')">
                            <div class="msg ${esMio?'me':'other'}" oncontextmenu="reaccionar(event,'${child.key}'); return false;">
                                ${content}
                                <div class="status-info">${d.h} ${esMio?(d.r?'<i class="fas fa-check-double" style="color:#88ccff"></i>':'<i class="fas fa-check"></i>'):''}</div>
                            </div>
                        </div>`;
                });
                box.innerHTML = html;
                scrollToBottom();
            });
        }

        function enviar() {
            const i = document.getElementById('msg-input');
            if (i.value.trim() && salaActual) {
                const now = new Date();
                const h = now.getHours() + ":" + now.getMinutes().toString().padStart(2, '0');
                const data = { u: usuarioActual, t: i.value, h: h, r: false };
                if (mensajeParaResponder) data.reply = mensajeParaResponder;
                db.ref(salaActual).push(data);
                i.value = ""; i.style.height = 'auto';
                cancelarRespuesta();
            }
        }

        // Resto de funciones (escucharUsuarios, borrar, etc.) manteniendo tu lógica original...
        function escucharUsuarios() {
            db.ref("usuarios").on("value", (snap) => {
                const list = document.getElementById("usuarios-conectados");
                list.innerHTML = "";
                snap.forEach(child => {
                    if (child.key !== usuarioActual) {
                        const salaID = "privado_" + [usuarioActual, child.key].sort().join("_");
                        const isOnline = child.val() === 'online';
                        const card = document.createElement("div");
                        card.className = "contact-card";
                        card.onclick = () => abrirChat(salaID, child.key);
                        card.innerHTML = `<span><i class="fas fa-user" style="margin-right:10px;"></i>${child.key}</span>
                                          <span class="online-dot ${isOnline?'dot-online':'dot-offline'}"></span>`;
                        list.appendChild(card);
                    }
                });
            });
        }

        function volverAContactos() {
            salaActual = "";
            localStorage.setItem('urrichat_last_room', 'contacts');
            document.getElementById('chat-container').style.display = 'none';
            document.getElementById('contacts-container').style.display = 'flex';
            fixViewport();
        }

        function escucharEscritura() {
            db.ref(`typing/${salaActual}`).on("value", (snap) => {
                let typing = false;
                snap.forEach(c => { if(c.key !== usuarioActual && c.val()) typing = true; });
                document.getElementById('chat-subtitle').style.display = typing ? 'block' : 'none';
            });
        }

        function manejarClickMensaje(key) {
            if (mensajesSeleccionados.length > 0) {
                if (mensajesSeleccionados.includes(key)) mensajesSeleccionados = mensajesSeleccionados.filter(k => k !== key);
                else mensajesSeleccionados.push(key);
                actualizarInterfazSeleccion();
            }
        }

        function actualizarInterfazSeleccion() {
            const count = mensajesSeleccionados.length;
            document.getElementById('chat-header-normal').style.display = count > 0 ? 'none' : 'flex';
            document.getElementById('chat-header-selection').style.display = count > 0 ? 'flex' : 'none';
            document.getElementById('selection-count').innerText = count;
        }

        function cancelarSeleccion() { mensajesSeleccionados = []; actualizarInterfazSeleccion(); }
        
        window.onload = () => {
            const saved = localStorage.getItem('urrichat_user');
            if(saved) registrarUsuario(saved);
            else document.getElementById('login').style.display = 'flex';
        };
    </script>
</body>
</html>
