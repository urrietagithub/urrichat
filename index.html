<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>UrriChat Pro</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <script src="https://www.gstatic.com/firebasejs/9.17.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.17.1/firebase-database-compat.js"></script>
    <style>
        /* --- ESTILOS MANTENIDOS Y MEJORADOS --- */
        body { font-family: 'Segoe UI', Roboto, sans-serif; background: #0f0f12; color: white; margin: 0; display: flex; flex-direction: column; height: 100vh; justify-content: center; align-items: center; overflow: hidden; }
        
        #login { display: flex; flex-direction: column; gap: 20px; width: 80%; max-width: 400px; text-align: center; }
        
        #contacts-container, #chat-container { display: none; flex-direction: column; width: 100%; max-width: 500px; height: 100%; background: #0f0f12; border-right: 1px solid #222; border-left: 1px solid #222; }
        
        .online-dot { height: 10px; width: 10px; background-color: #2ecc71; border-radius: 50%; display: inline-block; margin-right: 10px; box-shadow: 0 0 8px #2ecc71; }
        
        .contact-card { background: #1a1a20; padding: 15px; margin: 10px 0; border-radius: 12px; cursor: pointer; border: 1px solid #333; display: flex; align-items: center; justify-content: space-between; transition: all 0.2s ease; }
        .contact-card:hover { border-color: #007bff; transform: translateY(-2px); background: #22222b; }
        
        #messages { flex: 1; overflow-y: auto; padding: 15px; display: flex; flex-direction: column; gap: 12px; scroll-behavior: smooth; }
        
        /* Burbujas de Chat */
        .msg { padding: 10px 15px; border-radius: 18px; max-width: 75%; word-wrap: break-word; position: relative; animation: fadeIn 0.3s ease; }
        .msg.me { align-self: flex-end; background: #007bff; border-bottom-right-radius: 2px; }
        .msg.other { align-self: flex-start; background: #2c2c34; border-bottom-left-radius: 2px; }
        
        /* Imágenes adjuntas */
        .chat-img { max-width: 100%; border-radius: 10px; margin-top: 5px; cursor: pointer; display: block; }

        .header { display: flex; justify-content: space-between; align-items: center; padding: 15px; background: #1a1a20; border-bottom: 1px solid #333; }
        .btn-header { background: transparent; color: #007bff; border: 1px solid #007bff; padding: 6px 12px; border-radius: 6px; cursor: pointer; font-size: 13px; display: flex; align-items: center; gap: 5px; }
        
        .input-area { display: flex; padding: 15px; background: #1a1a20; gap: 8px; align-items: center; }
        input { flex: 1; padding: 12px; border-radius: 8px; border: none; background: #2c2c34; color: white; outline: none; font-size: 14px; text-align: center; }
        
        /* Botones Pro */
        button#main-btn { padding: 10px 18px; background: #007bff; color: white; border: none; border-radius: 8px; font-weight: bold; cursor: pointer; transition: 0.2s; }
        button#main-btn:active { transform: scale(0.95); }
        .btn-icon { background: #333; color: white; border: none; padding: 10px; border-radius: 8px; cursor: pointer; }

        small { display: block; font-size: 11px; color: #88ccff; margin-bottom: 4px; font-weight: bold; }
        .time { font-size: 9px; opacity: 0.6; display: block; text-align: right; margin-top: 4px; }
        #typing-indicator { font-size: 12px; color: #2ecc71; padding: 5px 15px; height: 20px; font-style: italic; }

        @keyframes fadeIn { from { opacity: 0; transform: translateY(5px); } to { opacity: 1; transform: translateY(0); } }
    </style>
</head>
<body onload="verificarSesion()">

    <div id="login">
        <i class="fas fa-comments" style="font-size: 4rem; color: #007bff;"></i>
        <h1 style="color: #007bff; font-size: 2.5rem; margin: 0;">URRICHAT</h1>
        <p style="color: #666;">Conéctate con el mundo</p>
        <input type="text" id="username" placeholder="Escribe tu alias...">
        <button id="main-btn" onclick="registrarUsuario()">
            <i class="fas fa-sign-in-alt"></i> ENTRAR AHORA
        </button>
    </div>

    <div id="contacts-container">
        <div class="header">
            <span id="mi-perfil" style="font-weight: bold; color: #2ecc71;"></span>
            <button class="btn-header" onclick="editarNombre()">
                <i class="fas fa-user-edit"></i> PERFIL
            </button>
        </div>
        <div id="lista-usuarios" style="padding: 15px; overflow-y: auto;">
            <div class="contact-card" onclick="abrirChat('muro', 'SALA PÚBLICA')" style="border-left: 5px solid #007bff; background: #1e1e26;">
                <span><i class="fas fa-globe-americas" style="margin-right: 10px;"></i> SALA PÚBLICA</span>
                <span class="online-dot"></span>
            </div>
            <p style="color: #666; font-size: 12px; margin: 25px 0 10px 5px; letter-spacing: 1px;">
                <i class="fas fa-users"></i> USUARIOS DISPONIBLES
            </p>
            <div id="usuarios-conectados"></div>
        </div>
    </div>

    <div id="chat-container">
        <div class="header">
            <button class="btn-header" onclick="volverAContactos()">
                <i class="fas fa-arrow-left"></i>
            </button>
            <span id="chat-title" style="font-weight: bold;">Chat</span>
            <button class="btn-header" style="color:#ff4444; border-color:#ff4444" onclick="vaciarChat()">
                <i class="fas fa-trash"></i>
            </button>
        </div>
        <div id="messages"></div>
        <div id="typing-indicator"></div>
        
        <div class="input-area">
            <input type="file" id="file-input" accept="image/*" style="display:none" onchange="enviarImagen(this)">
            <button class="btn-icon" onclick="document.getElementById('file-input').click()">
                <i class="fas fa-image"></i>
            </button>
            
            <input type="text" id="msg-input" placeholder="Escribe un mensaje..." onkeypress="if(event.key==='Enter') enviar()" oninput="notificarEscribiendo()">
            
            <button id="main-btn" onclick="enviar()">
                <i class="fas fa-paper-plane"></i>
            </button>
        </div>
    </div>

    <script>
        const firebaseConfig = {
            apiKey: "AIzaSyA7XKmn8f1w6hAVUZaS8Eui7FAnZRy0Myg",
            authDomain: "urrichatapp.firebaseapp.com",
            databaseURL: "https://urrichatapp-default-rtdb.firebaseio.com",
            projectId: "urrichatapp",
            storageBucket: "urrichatapp.firebasestorage.app",
            messagingSenderId: "504734750650",
            appId: "1:504734750650:web:51a8def62934aabbeb2f83"
        };

        firebase.initializeApp(firebaseConfig);
        const db = firebase.database();
        let usuarioActual = "";
        let salaActual = "";
        let typingTimeout;

        function verificarSesion() {
            const guardado = localStorage.getItem("urrichat_user");
            if (guardado) {
                usuarioActual = guardado;
                entrarApp();
            }
            if (Notification.permission !== "granted") Notification.requestPermission();
        }

        function registrarUsuario() {
            let inputName = document.getElementById('username').value.trim();
            if (inputName) {
                usuarioActual = inputName;
                localStorage.setItem("urrichat_user", usuarioActual);
                entrarApp();
            }
        }

        function entrarApp() {
            const userRef = db.ref("usuarios/" + usuarioActual);
            userRef.set("online");
            userRef.onDisconnect().remove();

            document.getElementById('login').style.display = 'none';
            document.getElementById('contacts-container').style.display = 'flex';
            document.getElementById('mi-perfil').innerHTML = `<i class="fas fa-circle" style="font-size:8px"></i> ${usuarioActual}`;
            escucharUsuarios();
        }

        function editarNombre() {
            let nuevoNombre = prompt("Nuevo nombre de usuario:", usuarioActual);
            if (nuevoNombre && nuevoNombre !== usuarioActual) {
                db.ref("usuarios/" + usuarioActual).remove();
                usuarioActual = nuevoNombre;
                localStorage.setItem("urrichat_user", usuarioActual);
                db.ref("usuarios/" + usuarioActual).set("online");
                document.getElementById('mi-perfil').innerHTML = `<i class="fas fa-circle" style="font-size:8px"></i> ${usuarioActual}`;
            }
        }

        function escucharUsuarios() {
            db.ref("usuarios").on("value", (snapshot) => {
                const listaDiv = document.getElementById("usuarios-conectados");
                listaDiv.innerHTML = "";
                snapshot.forEach((child) => {
                    const nombre = child.key;
                    if (nombre !== usuarioActual) {
                        const card = document.createElement("div");
                        card.className = "contact-card";
                        card.innerHTML = `<span><i class="fas fa-user-circle"></i> ${nombre}</span><span class="online-dot"></span>`;
                        const salaID = "privado_" + [usuarioActual, nombre].sort().join("_");
                        card.onclick = () => abrirChat(salaID, nombre);
                        listaDiv.appendChild(card);
                    }
                });
            });
        }

        function abrirChat(id, titulo) {
            salaActual = id;
            document.getElementById('contacts-container').style.display = 'none';
            document.getElementById('chat-container').style.display = 'flex';
            document.getElementById('chat-title').innerText = titulo;
            document.getElementById('messages').innerHTML = "";
            document.getElementById('msg-input').focus();
            escucharMensajes();
            escucharEscribiendo();
        }

        function volverAContactos() {
            db.ref(salaActual).off();
            db.ref("typing/" + salaActual + "/" + usuarioActual).remove();
            salaActual = "";
            document.getElementById('chat-container').style.display = 'none';
            document.getElementById('contacts-container').style.display = 'flex';
        }

        function enviar() {
            const input = document.getElementById('msg-input');
            const texto = input.value.trim();
            if (texto && salaActual) {
                db.ref(salaActual).push({ 
                    u: usuarioActual, 
                    t: texto, 
                    type: "text",
                    time: new Date().toLocaleTimeString([], {hour: '2-digit', minute:'2-digit'}) 
                });
                input.value = "";
                db.ref("typing/" + salaActual + "/" + usuarioActual).remove();
            }
        }

        // --- FUNCIONALIDAD PRO: ADJUNTAR IMÁGENES ---
        function enviarImagen(input) {
            const file = input.files[0];
            if (!file) return;

            const reader = new FileReader();
            reader.onload = function(e) {
                const base64Image = e.target.result;
                db.ref(salaActual).push({
                    u: usuarioActual,
                    t: base64Image,
                    type: "image",
                    time: new Date().toLocaleTimeString([], {hour: '2-digit', minute:'2-digit'})
                });
            };
            reader.readAsDataURL(file);
            input.value = ""; // Reset del input
        }

        function notificarEscribiendo() {
            if (!salaActual) return;
            db.ref("typing/" + salaActual + "/" + usuarioActual).set(true);
            clearTimeout(typingTimeout);
            typingTimeout = setTimeout(() => {
                db.ref("typing/" + salaActual + "/" + usuarioActual).remove();
            }, 2000);
        }

        function escucharEscribiendo() {
            db.ref("typing/" + salaActual).on("value", (snapshot) => {
                const typingDiv = document.getElementById("typing-indicator");
                let escribiendo = [];
                snapshot.forEach(child => {
                    if (child.key !== usuarioActual) escribiendo.push(child.key);
                });
                typingDiv.innerHTML = escribiendo.length > 0 ? `<i class="fas fa-pen-fancy"></i> ${escribiendo.join(", ")} escribiendo...` : "";
            });
        }

        function vaciarChat() {
            if(confirm("¿Seguro que deseas vaciar este chat de forma permanente?")) db.ref(salaActual).remove();
        }

        function escucharMensajes() {
            db.ref(salaActual).on("value", (snapshot) => {
                if (!snapshot.exists()) document.getElementById("messages").innerHTML = "";
            });

            db.ref(salaActual).limitToLast(50).on("child_added", (snapshot) => {
                const data = snapshot.val();
                const msgDiv = document.createElement("div");
                const esMio = data.u === usuarioActual;

                msgDiv.className = `msg ${esMio ? 'me' : 'other'}`;
                
                // Renderizar Texto o Imagen
                let contenido = data.type === "image" 
                    ? `<img src="${data.t}" class="chat-img" onclick="window.open(this.src)">` 
                    : data.t;

                msgDiv.innerHTML = `
                    ${!esMio ? `<small><i class="fas fa-user"></i> ${data.u}</small>` : ''}
                    ${contenido}
                    <span class="time">${data.time || ''}</span>
                `;

                const box = document.getElementById("messages");
                box.appendChild(msgDiv);
                
                if (box.scrollHeight - box.scrollTop <= box.clientHeight + 400) {
                    box.scrollTop = box.scrollHeight;
                }

                if (!esMio && document.hidden) {
                    new Notification("UrriChat: " + data.u, { 
                        body: data.type === "image" ? "📷 Imagen recibida" : data.t,
                        icon: "https://cdn-icons-png.flaticon.com/512/733/733585.png"
                    });
                    new Audio('https://assets.mixkit.co/active_storage/sfx/2354/2354-preview.mp3').play();
                }
            });
        }
    </script>
</body>
</html>
