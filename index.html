<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>UrriChat</title>

    <link rel="manifest" href="manifest.json">
    <meta name="theme-color" content="#0f0f12">
    <meta name="mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">

    <link rel="icon" href="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><circle cx=%2250%22 cy=%2250%22 r=%2248%22 fill=%22%23007bff%22/><path d=%22M30 35h40v25H45L30 75V35z%22 fill=%22white%22/></svg>">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <script src="https://www.gstatic.com/firebasejs/9.17.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.17.1/firebase-database-compat.js"></script>
    <style>
        /* --- ESTILOS BASE --- */
        body { 
            font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif; 
            background: radial-gradient(circle at center, #1a1a20 0%, #0f0f12 100%); 
            color: white; 
            margin: 0; 
            display: flex; 
            flex-direction: column; 
            height: 100vh; 
            justify-content: center; 
            align-items: center; 
            overflow: hidden;
            overscroll-behavior-y: contain; /* Permite el refresh nativo */
        }

        /* --- LOGIN --- */
        #login { 
            display: flex; 
            flex-direction: column; 
            gap: 25px; 
            width: 85%; 
            max-width: 380px; 
            text-align: center; 
            padding: 40px;
            background: rgba(26, 26, 32, 0.8);
            border: 1px solid rgba(255, 255, 255, 0.05);
            border-radius: 30px;
            box-shadow: 0 20px 40px rgba(0, 0, 0, 0.4);
            backdrop-filter: blur(10px);
        }

        #login i.fa-comments {
            filter: drop-shadow(0 0 15px rgba(0, 123, 255, 0.4));
            animation: float 3s ease-in-out infinite;
        }

        @keyframes float {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-10px); }
        }

        #username { 
            text-align: center; 
            padding: 14px 20px; 
            border-radius: 15px; 
            border: 2px solid #2c2c34; 
            background: #0f0f12; 
            color: white; 
            outline: none; 
            transition: all 0.3s ease;
            font-size: 16px;
        }

        #username:focus { 
            border-color: #007bff; 
            box-shadow: 0 0 15px rgba(0, 123, 255, 0.3); 
            background: #1a1a20;
        }

        #login-btn {
            padding: 14px;
            background: #007bff;
            color: white;
            border: none;
            border-radius: 15px;
            font-weight: 700;
            font-size: 16px;
            cursor: pointer;
            transition: all 0.3s ease;
            box-shadow: 0 4px 15px rgba(0, 123, 255, 0.3);
        }

        #login-btn:hover { background: #0056b3; transform: translateY(-2px); }

        #contacts-container, #chat-container { display: none; flex-direction: column; width: 100%; max-width: 500px; height: 100%; background: #0f0f12; }

        /* --- CONTACTOS --- */
        .online-dot { height: 10px; width: 10px; border-radius: 50%; display: inline-block; margin-right: 10px; }
        .dot-online { background-color: #2ecc71; box-shadow: 0 0 8px #2ecc71; }
        .dot-offline { background-color: #ff4444; box-shadow: 0 0 8px #ff4444; }

        .contact-card { background: #1a1a20; padding: 15px; margin: 10px 0; border-radius: 12px; cursor: pointer; border: 1px solid #333; display: flex; align-items: center; justify-content: space-between; transition: 0.3s; position: relative; }
        .contact-card:hover { border-color: #007bff; background: #25252d; }
        
        .unread-badge { background: #007bff; color: white; font-size: 10px; padding: 2px 7px; border-radius: 10px; font-weight: bold; margin: 0 10px; min-width: 12px; text-align: center; }

        /* --- CHAT --- */
        #messages { flex: 1; overflow-y: auto; padding: 15px; display: flex; flex-direction: column; gap: 15px; }

        .msg { padding: 10px 15px; border-radius: 18px; max-width: 75%; word-wrap: break-word; position: relative; display: flex; flex-direction: column; animation: fadeIn 0.3s ease; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }

        .msg span { font-size: 16px; line-height: 1.4; }
        .msg.me { align-self: flex-end; background: #007bff; border-bottom-right-radius: 2px; }
        .msg.other { align-self: flex-start; background: #2c2c34; border-bottom-left-radius: 2px; }

        .reactions-container { display: flex; gap: 4px; margin-top: 5px; flex-wrap: wrap; }
        .reaction-badge { background: #1a1a20; border: 1px solid #444; border-radius: 10px; padding: 2px 6px; font-size: 12px; display: flex; align-items: center; gap: 3px; }

        /* Menú de Reacciones Compacto (5 arriba, 5 abajo) */
        #reaction-selector { 
            display: none; 
            position: fixed; 
            background: #1a1a20; 
            border: 1px solid #333; 
            padding: 10px; 
            border-radius: 15px; 
            z-index: 1000; 
            box-shadow: 0 5px 25px rgba(0,0,0,0.9); 
            display: none; 
            grid-template-columns: repeat(5, 1fr); 
            gap: 12px;
        }

        .emoji-picker { display: none; position: absolute; bottom: 70px; left: 15px; background: #1a1a20; border: 1px solid #333; padding: 10px; border-radius: 15px; grid-template-columns: repeat(5, 1fr); gap: 8px; z-index: 100; box-shadow: 0 5px 20px rgba(0,0,0,0.8); }
        .emoji-item { cursor: pointer; font-size: 1.3rem; transition: 0.2s; text-align: center; }
        .emoji-item:hover { transform: scale(1.3); }

        .attachment { max-width: 100%; border-radius: 8px; margin-top: 5px; cursor: pointer; transition: 0.3s; }
        .attachment:hover { opacity: 0.8; }
        .file-link { color: #fff; text-decoration: underline; font-size: 13px; margin-top: 5px; display: flex; align-items: center; gap: 5px; }

        .status-info { display: flex; align-items: center; justify-content: flex-end; gap: 4px; margin-top: 4px; }
        .timestamp { font-size: 9px; opacity: 0.7; }
        .check-icon { font-size: 10px; color: #fff; opacity: 0.5; }
        .check-icon.read { color: #88ccff; opacity: 1; }

        .header { display: flex; justify-content: space-between; align-items: center; padding: 15px; background: #1a1a20; border-bottom: 1px solid #333; z-index: 10; }
        .btn-header { background: transparent; color: #007bff; border: 1px solid #007bff; padding: 6px 12px; border-radius: 8px; cursor: pointer; display: flex; align-items: center; gap: 5px; font-size: 14px; }

        .input-area { display: flex; padding: 15px; background: #1a1a20; gap: 8px; align-items: flex-end; position: relative; border-top: 1px solid #333; }
        textarea#msg-input { flex: 1; padding: 12px 20px; border-radius: 20px; border: none; background: #2c2c34; color: white; outline: none; resize: none; font-family: inherit; font-size: 16px; max-height: 150px; min-height: 20px; }

        button#main-btn { width: 45px; height: 45px; flex-shrink: 0; background: #007bff; color: white; border: none; border-radius: 50%; cursor: pointer; transition: 0.2s; display: flex; align-items: center; justify-content: center; }
        button#main-btn:active { transform: scale(0.9); }

        small { display: block; font-size: 11px; color: #88ccff; margin-bottom: 4px; font-weight: bold; }
        #file-input { display: none; }

        .btn-icon { background: none; border: none; color: #007bff; font-size: 1.2rem; cursor: pointer; padding: 5px; transition: 0.2s; margin-bottom: 5px; }
        .btn-icon:hover { color: #fff; }

        audio { height: 35px; max-width: 100%; margin-top: 5px; filter: invert(1); }
        .recording { color: #ff4444 !important; animation: pulse 1s infinite; }
        @keyframes pulse { 0% { opacity: 1; } 50% { opacity: 0.5; } 100% { opacity: 1; } }

        #scroll-down { position: absolute; bottom: 85px; right: 20px; background: #007bff; color: white; width: 35px; height: 35px; border-radius: 50%; display: none; align-items: center; justify-content: center; cursor: pointer; box-shadow: 0 4px 10px rgba(0,0,0,0.5); z-index: 10; border: none; }
    </style>
</head>
<body onclick="cerrarSelectores()">

    <div id="login">
        <div>
            <i class="fas fa-comments" style="font-size: 4.5rem; color: #007bff; margin-bottom: 10px;"></i>
            <h1 style="color: #007bff; font-size: 2.8rem; margin: 0; letter-spacing: -1px;">UrriChat</h1>
            <p style="color: #888; margin-top: 5px; font-size: 1rem;">Tu chat favorito</p>
        </div>
        <input type="text" id="username" placeholder="Introduce tu nombre de usuario..." autocomplete="off">
        <button id="login-btn" onclick="registrarUsuario()">
            Conectar <i class="fas fa-arrow-right" style="margin-left: 8px;"></i>
        </button>
    </div>

    <div id="contacts-container">
        <div class="header">
            <span id="mi-perfil" style="font-weight: bold; color: #2ecc71;"></span>
            <div style="display: flex; gap: 8px;">
                <button class="btn-header" onclick="editarNombre()"><i class="fas fa-user-edit"></i> Perfil</button>
                <button class="btn-header" style="color:#ff4444; border-color:#ff4444" onclick="cerrarSesion()"><i class="fas fa-sign-out-alt"></i> Salir</button>
            </div>
        </div>
        <div id="lista-usuarios" style="padding: 15px; overflow-y: auto;">
            <div class="contact-card" onclick="abrirChat('muro', 'Chat Grupal')" style="border-left: 5px solid #007bff; background: #1e1e26;">
                <span><i class="fas fa-users" style="margin-right: 10px;"></i> Chat Grupal</span>
                <div style="display:flex; align-items:center;">
                    <span id="badge-muro"></span>
                    <span class="online-dot dot-online"></span>
                </div>
            </div>
            <p style="color: #666; font-size: 15px; margin: 20px 0 10px 5px; font-weight: 500;">Usuarios De UrriChat</p>
            <div id="usuarios-conectados"> </div>
        </div>
    </div>

    <div id="chat-container">
        <div class="header">
            <button class="btn-header" onclick="volverAContactos()"><i class="fas fa-chevron-left"></i></button>
            <div style="flex: 1; text-align: center;">
                <span id="chat-title" style="font-weight: bold; display: block;">Chat</span>
                <span id="chat-subtitle" style="font-size: 10px; color: #2ecc71; display: none;">escribiendo...</span>
            </div>
            <button class="btn-header" style="color:#ff4444; border-color:#ff4444" onclick="vaciarChat()"><i class="fas fa-trash-alt"></i></button>
        </div>

        <div id="messages" onscroll="handleScroll(this)"></div>
        <button id="scroll-down" onclick="scrollToBottom()"><i class="fas fa-chevron-down"></i></button>

        <div class="input-area">
            <div id="emoji-picker" class="emoji-picker" onclick="event.stopPropagation()">
                <span class="emoji-item" onclick="addEmoji('😊')">😊</span>
                <span class="emoji-item" onclick="addEmoji('😂')">😂</span>
                <span class="emoji-item" onclick="addEmoji('❤️')">❤️</span>
                <span class="emoji-item" onclick="addEmoji('👍')">👍</span>
                <span class="emoji-item" onclick="addEmoji('🔥')">🔥</span>
                <span class="emoji-item" onclick="addEmoji('😮')">😮</span>
                <span class="emoji-item" onclick="addEmoji('😢')">😢</span>
                <span class="emoji-item" onclick="addEmoji('👏')">👏</span>
                <span class="emoji-item" onclick="addEmoji('😎')">😎</span>
                <span class="emoji-item" onclick="addEmoji('🎉')">🎉</span>
            </div>

            <input type="file" id="file-input" onchange="enviarArchivo(this)">
            <button class="btn-icon" onclick="toggleEmojiPicker(event)"><i class="far fa-smile"></i></button>
            <button class="btn-icon" onclick="document.getElementById('file-input').click()"><i class="fas fa-paperclip"></i></button>
            <button class="btn-icon" id="mic-btn" onclick="toggleAudio()"><i class="fas fa-microphone"></i></button>

            <textarea id="msg-input" placeholder="Escribe tu mensaje..." rows="1" oninput="autoResize(this)" onkeydown="checkEnter(event)"></textarea>

            <button id="main-btn" onclick="enviar()">
                <i class="fas fa-paper-plane"></i>
            </button>
        </div>
    </div>

    <div id="reaction-selector" onclick="event.stopPropagation()">
        <span class="emoji-item" onclick="aplicarReaccion('😊')">😊</span>
        <span class="emoji-item" onclick="aplicarReaccion('😂')">😂</span>
        <span class="emoji-item" onclick="aplicarReaccion('❤️')">❤️</span>
        <span class="emoji-item" onclick="aplicarReaccion('👍')">👍</span>
        <span class="emoji-item" onclick="aplicarReaccion('🔥')">🔥</span>
        <span class="emoji-item" onclick="aplicarReaccion('😮')">😮</span>
        <span class="emoji-item" onclick="aplicarReaccion('😢')">😢</span>
        <span class="emoji-item" onclick="aplicarReaccion('👏')">👏</span>
        <span class="emoji-item" onclick="aplicarReaccion('😎')">😎</span>
        <span class="emoji-item" onclick="aplicarReaccion('🎉')">🎉</span>
    </div>

    <script>
        const firebaseConfig = {
            apiKey: "AIzaSyA7XKmn8f1w6hAVUZaS8Eui7FAnZRy0Myg",
            authDomain: "urrichatapp.firebaseapp.com",
            databaseURL: "https://urrichatapp-default-rtdb.firebaseio.com",
            projectId: "urrichatapp",
            storageBucket: "urrichatapp.firebasestorage.app",
            messagingSenderId: "504734750650",
            appId: "1:504734750650:web:51a8def62934aabbeb2f83"
        };

        firebase.initializeApp(firebaseConfig);
        const db = firebase.database();
        let usuarioActual = "";
        let salaActual = "";
        let typingTimeout;
        let mediaRecorder;
        let audioChunks = [];
        let isRecording = false;
        let msgIdParaReaccionar = "";

        function autoResize(textarea) {
            textarea.style.height = 'auto';
            textarea.style.height = textarea.scrollHeight + 'px';
            if (salaActual && usuarioActual) {
                db.ref(`typing/${salaActual}/${usuarioActual}`).set(true);
                clearTimeout(typingTimeout);
                typingTimeout = setTimeout(() => {
                    db.ref(`typing/${salaActual}/${usuarioActual}`).set(false);
                }, 1500);
            }
        }

        function checkEnter(event) {
            if (event.key === "Enter" && !event.shiftKey) {
                event.preventDefault();
                enviar();
            }
        }

        function registrarUsuario(nombrePersistente) {
            let inputName = nombrePersistente || document.getElementById('username').value.trim();
            if (inputName) {
                usuarioActual = inputName;
                localStorage.setItem('urrichat_user', usuarioActual);
                const userRef = db.ref("usuarios/" + usuarioActual);
                db.ref(".info/connected").on("value", (snap) => {
                    if (snap.val() === true) {
                        userRef.onDisconnect().set("offline");
                        userRef.set("online");
                    }
                });
                document.getElementById('login').style.display = 'none';
                document.getElementById('contacts-container').style.display = 'flex';
                document.getElementById('mi-perfil').innerText = "● " + usuarioActual;
                escucharUsuarios();
                verificarMensajesNuevos('muro');
            }
        }

        function escucharUsuarios() {
            db.ref("usuarios").on("value", (snapshot) => {
                const listaDiv = document.getElementById("usuarios-conectados");
                listaDiv.innerHTML = "";
                snapshot.forEach((child) => {
                    const nombre = child.key;
                    const estado = child.val(); 
                    if (nombre !== usuarioActual) {
                        const salaID = "privado_" + [usuarioActual, nombre].sort().join("_");
                        const card = document.createElement("div");
                        card.className = "contact-card";
                        const statusClass = (estado === "online") ? "dot-online" : "dot-offline";
                        
                        card.innerHTML = `
                            <span><i class="fas fa-user-circle" style="margin-right: 10px;"></i>${nombre}</span>
                            <div style="display:flex; align-items:center;">
                                <span id="badge-${salaID}"></span>
                                <span class="online-dot ${statusClass}"></span>
                            </div>`;
                        
                        card.onclick = () => abrirChat(salaID, nombre);
                        listaDiv.appendChild(card);
                        verificarMensajesNuevos(salaID);
                    }
                });
            });
        }

        function verificarMensajesNuevos(salaID) {
            db.ref(salaID).on("value", (snap) => {
                const badge = document.getElementById(`badge-${salaID}`);
                if (!badge) return;
                if (salaActual === salaID) {
                    badge.innerHTML = "";
                    return;
                }
                let count = 0;
                snap.forEach(msg => {
                    const m = msg.val();
                    if (m.u !== usuarioActual && m.r === false) count++;
                });
                badge.innerHTML = count > 0 ? `<span class="unread-badge">${count}</span>` : "";
            });
        }

        function abrirChat(id, titulo) {
            if(salaActual) {
                db.ref(salaActual).off();
                db.ref(`typing/${salaActual}`).off();
            }
            salaActual = id;
            document.getElementById('contacts-container').style.display = 'none';
            document.getElementById('chat-container').style.display = 'flex';
            document.getElementById('chat-title').innerText = titulo;
            document.getElementById('messages').innerHTML = "";
            escucharMensajes();
            escucharEscribiendo();
        }

        function escucharEscribiendo() {
            db.ref(`typing/${salaActual}`).on("value", (snap) => {
                const typingData = snap.val();
                let escribiendo = false;
                for (let user in typingData) {
                    if (typingData[user] === true && user !== usuarioActual) escribiendo = true;
                }
                document.getElementById('chat-subtitle').style.display = escribiendo ? 'block' : 'none';
            });
        }

        function escucharMensajes() {
            db.ref(salaActual).on("value", (snapshot) => {
                const box = document.getElementById("messages");
                let shouldScroll = box.scrollHeight - box.scrollTop <= box.clientHeight + 150;
                let htmlTemp = "";
                snapshot.forEach((child) => {
                    const data = child.val();
                    const msgId = child.key;
                    const esMio = data.u === usuarioActual;

                    if (!esMio && data.r === false && document.visibilityState === 'visible') {
                        db.ref(`${salaActual}/${msgId}/r`).set(true);
                    }

                    const alineacion = esMio ? 'me' : 'other';
                    let contenido = !esMio ? `<small>${data.u}</small>` : "";
                    if(data.t) contenido += `<span>${data.t}</span>`;
                    if(data.file) {
                        if(data.fileType.startsWith("image/")) {
                            contenido += `<img src="${data.file}" class="attachment" onclick="window.open(this.src)">`;
                        } else if(data.fileType.startsWith("audio/")) {
                            contenido += `<audio controls src="${data.file}"></audio>`;
                        } else {
                            contenido += `<a href="${data.file}" download="${data.fileName}" class="file-link"><i class="fas fa-file-download"></i> ${data.fileName}</a>`;
                        }
                    }

                    if(data.reacciones) {
                        contenido += `<div class="reactions-container">`;
                        for(let e in data.reacciones) {
                            contenido += `<div class="reaction-badge">${e} ${data.reacciones[e]}</div>`;
                        }
                        contenido += `</div>`;
                    }

                    const checkClass = data.r ? "read" : "";
                    const statusInfo = `<div class="status-info">
                        <span class="timestamp">${data.h || '--:--'}</span>
                        ${esMio ? `<i class="fas fa-check-double check-icon ${checkClass}"></i>` : ''}
                    </div>`;

                    htmlTemp += `<div class="msg ${alineacion}" ondblclick="reaccionar(event, '${msgId}')">${contenido}${statusInfo}</div>`;
                });
                box.innerHTML = htmlTemp;
                if (shouldScroll) scrollToBottom();
            });
        }

        function enviar() {
            const input = document.getElementById('msg-input');
            const texto = input.value.trim();
            if (texto && salaActual) {
                const ahora = new Date();
                const horaStr = ahora.getHours() + ":" + ahora.getMinutes().toString().padStart(2, '0');
                db.ref(salaActual).push({ u: usuarioActual, t: texto, h: horaStr, r: false });
                db.ref(`typing/${salaActual}/${usuarioActual}`).set(false);
                input.value = "";
                input.style.height = 'auto'; 
                input.focus();
                setTimeout(scrollToBottom, 50);
            }
        }

        function handleScroll(el) {
            const btn = document.getElementById('scroll-down');
            const isAtBottom = el.scrollHeight - el.scrollTop <= el.clientHeight + 100;
            btn.style.display = isAtBottom ? 'none' : 'flex';
        }

        function scrollToBottom() {
            const box = document.getElementById("messages");
            box.scrollTo({ top: box.scrollHeight, behavior: 'smooth' });
        }

        function volverAContactos() {
            if(salaActual) {
                db.ref(salaActual).off();
                db.ref(`typing/${salaActual}`).off();
                db.ref(`typing/${salaActual}/${usuarioActual}`).set(false);
            }
            salaActual = ""; 
            document.getElementById('chat-container').style.display = 'none';
            document.getElementById('contacts-container').style.display = 'flex';
        }

        function enviarArchivo(input) {
            const file = input.files[0];
            if (!file || !salaActual) return;
            const reader = new FileReader();
            reader.onload = function(e) {
                const ahora = new Date();
                const horaStr = ahora.getHours() + ":" + ahora.getMinutes().toString().padStart(2, '0');
                db.ref(salaActual).push({ u: usuarioActual, h: horaStr, file: e.target.result, fileName: file.name, fileType: file.type, r: false });
            };
            reader.readAsDataURL(file);
            input.value = "";
        }

        async function toggleAudio() {
            const micBtn = document.getElementById('mic-btn');
            if (!isRecording) {
                try {
                    const stream = await navigator.mediaDevices.getUserMedia({ audio: true });
                    mediaRecorder = new MediaRecorder(stream);
                    audioChunks = [];
                    mediaRecorder.ondataavailable = e => audioChunks.push(e.data);
                    mediaRecorder.onstop = () => {
                        const audioBlob = new Blob(audioChunks, { type: 'audio/webm' });
                        const reader = new FileReader();
                        reader.onload = (e) => {
                            const ahora = new Date();
                            const horaStr = ahora.getHours() + ":" + ahora.getMinutes().toString().padStart(2, '0');
                            db.ref(salaActual).push({ u: usuarioActual, h: horaStr, file: e.target.result, fileType: 'audio/webm', r: false });
                        };
                        reader.readAsDataURL(audioBlob);
                        stream.getTracks().forEach(track => track.stop());
                    };
                    mediaRecorder.start();
                    isRecording = true; micBtn.classList.add('recording');
                } catch (err) { alert("Micrófono no disponible"); }
            } else {
                mediaRecorder.stop(); isRecording = false; micBtn.classList.remove('recording');
            }
        }

        function toggleEmojiPicker(e) {
            e.stopPropagation();
            const p = document.getElementById('emoji-picker');
            p.style.display = (p.style.display === 'grid') ? 'none' : 'grid';
        }

        function addEmoji(e) {
            const i = document.getElementById('msg-input');
            i.value += e; autoResize(i); 
            document.getElementById('emoji-picker').style.display = 'none';
            i.focus();
        }

        function reaccionar(event, msgId) {
            event.stopPropagation();
            msgIdParaReaccionar = msgId;
            const selector = document.getElementById('reaction-selector');
            selector.style.display = 'grid';
            
            // Posicionamiento inteligente para que no se salga de pantalla
            let top = event.clientY - 80;
            let left = event.clientX - 100;
            
            if (left < 10) left = 10;
            if (left + 200 > window.innerWidth) left = window.innerWidth - 210;
            if (top < 10) top = event.clientY + 20;

            selector.style.top = top + 'px';
            selector.style.left = left + 'px';
        }

        function aplicarReaccion(emoji) {
            if (msgIdParaReaccionar && salaActual) {
                const rRef = db.ref(`${salaActual}/${msgIdParaReaccionar}/reacciones/${emoji}`);
                rRef.transaction((currentValue) => (currentValue || 0) + 1);
            }
            cerrarSelectores();
        }

        function cerrarSelectores() {
            document.getElementById('emoji-picker').style.display = 'none';
            document.getElementById('reaction-selector').style.display = 'none';
        }

        function vaciarChat() { if(confirm("¿Borrar historial?")) db.ref(salaActual).remove(); }
        
        function cerrarSesion() {
            if (confirm("¿Cerrar sesión?")) {
                if (usuarioActual) db.ref("usuarios/" + usuarioActual).set("offline");
                localStorage.removeItem('urrichat_user');
                window.location.reload();
            }
        }

        function editarNombre() {
            let n = prompt("Nuevo nombre:", usuarioActual);
            if (n && n !== usuarioActual) {
                db.ref("usuarios/" + usuarioActual).set("offline");
                usuarioActual = n;
                localStorage.setItem('urrichat_user', n);
                db.ref("usuarios/" + n).set("online");
                document.getElementById('mi-perfil').innerText = "● " + n;
            }
        }

        window.onload = () => {
            const savedUser = localStorage.getItem('urrichat_user');
            if (savedUser) registrarUsuario(savedUser);
            if ("Notification" in window) Notification.requestPermission();
        };

    </script>
</body>
</html>
