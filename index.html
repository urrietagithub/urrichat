<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>UrriChat Web</title>
    <script src="https://www.gstatic.com/firebasejs/9.17.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.17.1/firebase-database-compat.js"></script>
    <style>
        /* --- ESTILOS MANTENIDOS --- */
        body { font-family: sans-serif; background: #0f0f12; color: white; margin: 0; display: flex; flex-direction: column; height: 100vh; justify-content: center; align-items: center; }
        #login { display: flex; flex-direction: column; gap: 20px; width: 80%; max-width: 400px; text-align: center; }
        #contacts-container, #chat-container { display: none; flex-direction: column; width: 100%; max-width: 500px; height: 100%; background: #0f0f12; }
        .online-dot { height: 10px; width: 10px; background-color: #2ecc71; border-radius: 50%; display: inline-block; margin-right: 10px; box-shadow: 0 0 5px #2ecc71; }
        .contact-card { background: #1a1a20; padding: 15px; margin: 10px 0; border-radius: 10px; cursor: pointer; border: 1px solid #333; display: flex; align-items: center; justify-content: space-between; }
        .contact-card:hover { border-color: #007bff; }
        #messages { flex: 1; overflow-y: auto; padding: 15px; display: flex; flex-direction: column; gap: 10px; }
        .msg { padding: 10px 15px; border-radius: 18px; max-width: 75%; word-wrap: break-word; }
        .msg.me { align-self: flex-end; background: #007bff; border-bottom-right-radius: 2px; }
        .msg.other { align-self: flex-start; background: #2c2c34; border-bottom-left-radius: 2px; }
        .header { display: flex; justify-content: space-between; align-items: center; padding: 15px; background: #1a1a20; border-bottom: 1px solid #333; }
        .btn-header { background: transparent; color: #007bff; border: 1px solid #007bff; padding: 5px 10px; border-radius: 5px; cursor: pointer; }
        .input-area { display: flex; padding: 15px; background: #1a1a20; gap: 5px; }
        input { flex: 1; padding: 12px; border-radius: 5px; border: none; background: #2c2c34; color: white; outline: none; }
        button#main-btn { padding: 10px 20px; background: #007bff; color: white; border: none; border-radius: 5px; font-weight: bold; }
        small { display: block; font-size: 11px; color: #88ccff; margin-bottom: 4px; }
    </style>
</head>
<body onload="verificarSesion()">

    <div id="login">
        <h1 style="color: #007bff; font-size: 3rem; margin-bottom: 10px;">URRICHAT</h1>
        <p style="color: #666;">Ingresa para comenzar</p>
        <input type="text" id="username" placeholder="Tu nombre de usuario...">
        <button id="main-btn" onclick="registrarUsuario()">CONECTAR</button>
    </div>

    <div id="contacts-container">
        <div class="header">
            <span id="mi-perfil" style="font-weight: bold; color: #2ecc71;"></span>
            <button class="btn-header" onclick="editarNombre()">EDITAR PERFIL</button>
        </div>
        <div id="lista-usuarios" style="padding: 15px; overflow-y: auto;">
            <div class="contact-card" onclick="abrirChat('muro', 'SALA PÚBLICA')" style="border-left: 5px solid #007bff; background: #1e1e26;">
                <span>SALA PÚBLICA</span>
                <span class="online-dot"></span>
            </div>
            <p style="color: #666; font-size: 12px; margin: 20px 0 10px 5px;">USUARIOS EN LÍNEA</p>
            <div id="usuarios-conectados"></div>
        </div>
    </div>

    <div id="chat-container">
        <div class="header">
            <button class="btn-header" onclick="volverAContactos()">< Atrás</button>
            <span id="chat-title" style="font-weight: bold;">Chat</span>
            <button class="btn-header" style="color:#ff4444; border-color:#ff4444" onclick="vaciarChat()">BORRAR</button>
        </div>
        <div id="messages"></div>
        <div class="input-area">
            <input type="text" id="msg-input" placeholder="Escribe un mensaje..." onkeypress="if(event.key==='Enter') enviar()">
            <button id="main-btn" onclick="enviar()">></button>
        </div>
    </div>

    <script>
        const firebaseConfig = {
            apiKey: "AIzaSyA7XKmn8f1w6hAVUZaS8Eui7FAnZRy0Myg",
            authDomain: "urrichatapp.firebaseapp.com",
            databaseURL: "https://urrichatapp-default-rtdb.firebaseio.com",
            projectId: "urrichatapp",
            storageBucket: "urrichatapp.firebasestorage.app",
            messagingSenderId: "504734750650",
            appId: "1:504734750650:web:51a8def62934aabbeb2f83"
        };

        firebase.initializeApp(firebaseConfig);
        const db = firebase.database();
        let usuarioActual = "";
        let salaActual = "";

        // NUEVO: Verificar si ya existe un usuario guardado
        function verificarSesion() {
            const guardado = localStorage.getItem("urrichat_user");
            if (guardado) {
                usuarioActual = guardado;
                entrarApp();
            }
            // Pedir permiso para notificaciones
            if (Notification.permission !== "granted") {
                Notification.requestPermission();
            }
        }

        function registrarUsuario() {
            let inputName = document.getElementById('username').value.trim();
            if (inputName) {
                usuarioActual = inputName;
                localStorage.setItem("urrichat_user", usuarioActual); // Guardar en el teléfono
                entrarApp();
            }
        }

        function entrarApp() {
            db.ref("usuarios/" + usuarioActual).set("online");
            document.getElementById('login').style.display = 'none';
            document.getElementById('contacts-container').style.display = 'flex';
            document.getElementById('mi-perfil').innerText = "● " + usuarioActual;
            escucharUsuarios();
        }

        function editarNombre() {
            let nuevoNombre = prompt("Nuevo nombre:", usuarioActual);
            if (nuevoNombre && nuevoNombre !== usuarioActual) {
                db.ref("usuarios/" + usuarioActual).remove();
                usuarioActual = nuevoNombre;
                localStorage.setItem("urrichat_user", usuarioActual);
                db.ref("usuarios/" + usuarioActual).set("online");
                document.getElementById('mi-perfil').innerText = "● " + usuarioActual;
            }
        }

        function escucharUsuarios() {
            db.ref("usuarios").on("value", (snapshot) => {
                const listaDiv = document.getElementById("usuarios-conectados");
                listaDiv.innerHTML = "";
                snapshot.forEach((child) => {
                    const nombre = child.key;
                    if (nombre !== usuarioActual) {
                        const card = document.createElement("div");
                        card.className = "contact-card";
                        card.innerHTML = `<span>${nombre}</span><span class="online-dot"></span>`;
                        const salaID = "privado_" + [usuarioActual, nombre].sort().join("_");
                        card.onclick = () => abrirChat(salaID, nombre);
                        listaDiv.appendChild(card);
                    }
                });
            });
        }

        function abrirChat(id, titulo) {
            salaActual = id;
            document.getElementById('contacts-container').style.display = 'none';
            document.getElementById('chat-container').style.display = 'flex';
            document.getElementById('chat-title').innerText = titulo;
            document.getElementById('messages').innerHTML = "";
            escucharMensajes();
        }

        function volverAContactos() {
            db.ref(salaActual).off();
            salaActual = "";
            document.getElementById('chat-container').style.display = 'none';
            document.getElementById('contacts-container').style.display = 'flex';
        }

        function enviar() {
            const input = document.getElementById('msg-input');
            const texto = input.value.trim();
            if (texto && salaActual) {
                db.ref(salaActual).push({ u: usuarioActual, t: texto, time: Date.now() });
                input.value = "";
            }
        }

        function vaciarChat() {
            if(confirm("¿Borrar historial?")) db.ref(salaActual).remove();
        }

        function escucharMensajes() {
            db.ref(salaActual).on("value", (snapshot) => {
                if (!snapshot.exists()) document.getElementById("messages").innerHTML = "";
            });

            db.ref(salaActual).limitToLast(50).on("child_added", (snapshot) => {
                const data = snapshot.val();
                const msgDiv = document.createElement("div");
                const esMio = data.u === usuarioActual;
                
                msgDiv.className = `msg ${esMio ? 'me' : 'other'}`;
                msgDiv.innerHTML = esMio ? data.t : `<small>${data.u}</small>${data.t}`;
                
                const box = document.getElementById("messages");
                box.appendChild(msgDiv);
                box.scrollTop = box.scrollHeight;

                // NUEVO: Enviar notificación si el mensaje no es mío y no estoy viendo ese chat
                if (!esMio && document.hidden) {
                    new Notification("Nuevo mensaje en UrriChat", {
                        body: `${data.u}: ${data.t}`,
                        icon: "https://cdn-icons-png.flaticon.com/512/733/733585.png"
                    });
                    const audio = new Audio('https://assets.mixkit.co/active_storage/sfx/2354/2354-preview.mp3');
                    audio.play();
                }
            });
        }
    </script>
</body>
</html>
