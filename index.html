<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>UrriChat</title>
    <link rel="icon" href="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><circle cx=%2250%22 cy=%2250%22 r=%2248%22 fill=%22%23007bff%22/><path d=%22M30 35h40v25H45L30 75V35z%22 fill=%22white%22/></svg>">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <script src="https://www.gstatic.com/firebasejs/9.17.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.17.1/firebase-database-compat.js"></script>
    <style>
        /* --- ESTILOS BASE --- */
        body { 
            font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif; 
            background: radial-gradient(circle at center, #1a1a20 0%, #0f0f12 100%); 
            color: white; 
            margin: 0; 
            display: flex; 
            flex-direction: column; 
            height: 100vh; 
            justify-content: center; 
            align-items: center; 
            overflow: hidden; /* Evita scrolls raros en el login */
        }

        /* --- LOGIN AJUSTADO PARA MÓVILES (MÁS DESPEGADO DE LOS LADOS) --- */
        #login { 
            display: flex; 
            flex-direction: column; 
            gap: 25px; 
            width: 80%; 
            max-width: 340px; 
            text-align: center; 
            padding: 40px 25px;
            background: rgba(30, 30, 38, 0.98); 
            border: 1px solid rgba(255, 255, 255, 0.15); 
            border-radius: 35px;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.7);
            backdrop-filter: blur(20px);
        }

        #login i.fa-comments {
            filter: drop-shadow(0 0 15px rgba(0, 123, 255, 0.4));
            animation: float 3s ease-in-out infinite;
        }

        @keyframes float {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-10px); }
        }

        #username { 
            text-align: center; 
            padding: 14px 20px; 
            border-radius: 15px; 
            border: 2px solid #2c2c34; 
            background: #0f0f12; 
            color: white; 
            outline: none; 
            transition: all 0.3s ease;
            font-size: 16px;
            width: calc(100% - 44px); /* Ajuste para el padding interno */
            margin: 0 auto;
        }

        #username:focus { 
            border-color: #007bff; 
            box-shadow: 0 0 15px rgba(0, 123, 255, 0.3); 
            background: #1a1a20;
        }

        #login-btn {
            padding: 14px;
            background: #007bff;
            color: white;
            border: none;
            border-radius: 15px;
            font-weight: 700;
            font-size: 16px;
            cursor: pointer;
            transition: all 0.3s ease;
            box-shadow: 0 4px 15px rgba(0, 123, 255, 0.3);
            width: 100%;
        }

        /* Mantengo el resto de tus estilos intactos */
        #contacts-container, #chat-container { display: none; flex-direction: column; width: 100%; max-width: 500px; height: 100%; background: #0f0f12; }
        .online-dot { height: 10px; width: 10px; border-radius: 50%; display: inline-block; margin-right: 10px; }
        .dot-online { background-color: #2ecc71; box-shadow: 0 0 8px #2ecc71; }
        .dot-offline { background-color: #ff4444; box-shadow: 0 0 8px #ff4444; }
        .contact-card { background: #1a1a20; padding: 15px; margin: 10px 0; border-radius: 12px; cursor: pointer; border: 1px solid #333; display: flex; align-items: center; justify-content: space-between; }
        #messages { flex: 1; overflow-y: auto; padding: 15px; display: flex; flex-direction: column; gap: 15px; }
        .msg { padding: 10px 15px; border-radius: 18px; max-width: 75%; word-wrap: break-word; position: relative; display: flex; flex-direction: column; }
        .msg.me { align-self: flex-end; background: #007bff; }
        .msg.other { align-self: flex-start; background: #2c2c34; }
        .header { display: flex; justify-content: space-between; align-items: center; padding: 15px; background: #1a1a20; border-bottom: 1px solid #333; }
        .input-area { display: flex; padding: 15px; background: #1a1a20; gap: 8px; align-items: flex-end; }
        textarea#msg-input { flex: 1; padding: 12px 20px; border-radius: 20px; border: none; background: #2c2c34; color: white; font-size: 16px; }
        button#main-btn { width: 45px; height: 45px; background: #007bff; color: white; border: none; border-radius: 50%; display: flex; align-items: center; justify-content: center; }
    </style>
</head>
<body>

    <div id="login">
        <div>
            <i class="fas fa-comments" style="font-size: 4rem; color: #007bff; margin-bottom: 10px;"></i>
            <h1 style="color: #007bff; font-size: 2.5rem; margin: 0; letter-spacing: -1px;">UrriChat</h1>
            <p style="color: #888; margin-top: 5px; font-size: 0.9rem;">Tu chat favorito</p>
        </div>
        <input type="text" id="username" placeholder="Nombre de usuario...">
        <button id="login-btn" onclick="registrarUsuario()">
            Conectar <i class="fas fa-arrow-right" style="margin-left: 8px;"></i>
        </button>
    </div>

    <div id="contacts-container">
        <div class="header">
            <span id="mi-perfil" style="font-weight: bold; color: #2ecc71;"></span>
            <div style="display: flex; gap: 8px;">
                <button onclick="editarNombre()" style="background:transparent; border:1px solid #007bff; color:#007bff; border-radius:8px; padding:5px 10px;">Perfil</button>
                <button onclick="cerrarSesion()" style="background:transparent; border:1px solid #ff4444; color:#ff4444; border-radius:8px; padding:5px 10px;">Salir</button>
            </div>
        </div>
        <div id="lista-usuarios" style="padding: 15px;">
            <div class="contact-card" onclick="abrirChat('muro', 'Chat Grupal')" style="border-left: 5px solid #007bff; background: #1e1e26;">
                <span><i class="fas fa-users"></i> Chat Grupal</span>
                <span class="online-dot dot-online"></span>
            </div>
            <div id="usuarios-conectados"> </div>
        </div>
    </div>

    <div id="chat-container">
        <div class="header">
            <button onclick="volverAContactos()" style="background:transparent; border:none; color:#007bff; font-size:1.2rem;"><i class="fas fa-chevron-left"></i></button>
            <span id="chat-title" style="font-weight: bold;">Chat</span>
            <div></div>
        </div>
        <div id="messages"></div>
        <div class="input-area">
            <textarea id="msg-input" placeholder="Escribe algo..." rows="1" onkeydown="checkEnter(event)"></textarea>
            <button id="main-btn" onclick="enviar()"><i class="fas fa-paper-plane"></i></button>
        </div>
    </div>

    <script>
        // Tu lógica de Firebase original aquí...
        const firebaseConfig = {
            apiKey: "AIzaSyA7XKmn8f1w6hAVUZaS8Eui7FAnZRy0Myg",
            authDomain: "urrichatapp.firebaseapp.com",
            databaseURL: "https://urrichatapp-default-rtdb.firebaseio.com",
            projectId: "urrichatapp",
            storageBucket: "urrichatapp.firebasestorage.app",
            messagingSenderId: "504734750650",
            appId: "1:504734750650:web:51a8def62934aabbeb2f83"
        };

        firebase.initializeApp(firebaseConfig);
        const db = firebase.database();
        let usuarioActual = "";
        let salaActual = "";

        function registrarUsuario(nombrePersistente) {
            let inputName = nombrePersistente || document.getElementById('username').value.trim();
            if (inputName) {
                usuarioActual = inputName;
                localStorage.setItem('urrichat_user', usuarioActual);
                db.ref("usuarios/" + usuarioActual).set("online");
                db.ref("usuarios/" + usuarioActual).onDisconnect().set("offline");
                document.getElementById('login').style.display = 'none';
                document.getElementById('contacts-container').style.display = 'flex';
                document.getElementById('mi-perfil').innerText = "● " + usuarioActual;
                escucharUsuarios();
            }
        }

        function escucharUsuarios() {
            db.ref("usuarios").on("value", (snapshot) => {
                const listaDiv = document.getElementById("usuarios-conectados");
                listaDiv.innerHTML = "";
                snapshot.forEach((child) => {
                    const nombre = child.key;
                    const estado = child.val(); 
                    if (nombre !== usuarioActual) {
                        const card = document.createElement("div");
                        card.className = "contact-card";
                        const statusClass = (estado === "online") ? "dot-online" : "dot-offline";
                        card.innerHTML = `<span>${nombre}</span><span class="online-dot ${statusClass}"></span>`;
                        card.onclick = () => abrirChat("privado_" + [usuarioActual, nombre].sort().join("_"), nombre);
                        listaDiv.appendChild(card);
                    }
                });
            });
        }

        function abrirChat(id, titulo) {
            salaActual = id;
            document.getElementById('contacts-container').style.display = 'none';
            document.getElementById('chat-container').style.display = 'flex';
            document.getElementById('chat-title').innerText = titulo;
            escucharMensajes();
        }

        function volverAContactos() {
            document.getElementById('chat-container').style.display = 'none';
            document.getElementById('contacts-container').style.display = 'flex';
        }

        function enviar() {
            const input = document.getElementById('msg-input');
            if (input.value.trim() && salaActual) {
                const ahora = new Date();
                const horaStr = ahora.getHours() + ":" + ahora.getMinutes().toString().padStart(2, '0');
                db.ref(salaActual).push({ u: usuarioActual, t: input.value, h: horaStr });
                input.value = "";
            }
        }

        function escucharMensajes() {
            db.ref(salaActual).on("value", (snapshot) => {
                const box = document.getElementById("messages");
                box.innerHTML = "";
                snapshot.forEach((child) => {
                    const data = child.val();
                    const esMio = data.u === usuarioActual;
                    const msgDiv = document.createElement("div");
                    msgDiv.className = `msg ${esMio ? 'me' : 'other'}`;
                    msgDiv.innerHTML = `<span>${data.t}</span><small style="font-size:10px; opacity:0.6; text-align:right;">${data.h}</small>`;
                    box.appendChild(msgDiv);
                });
                box.scrollTop = box.scrollHeight;
            });
        }

        function checkEnter(event) { if (event.key === "Enter") enviar(); }
        window.onload = () => { if (localStorage.getItem('urrichat_user')) registrarUsuario(localStorage.getItem('urrichat_user')); };
    </script>
</body>
</html>
