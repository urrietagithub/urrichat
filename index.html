<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>UrriChat</title>

    <link rel="manifest" href="manifest.json">
    <meta name="theme-color" content="#0f0f12">
    <meta name="mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">

    <link rel="icon" href="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><circle cx=%2250%22 cy=%2250%22 r=%2248%22 fill=%22%23007bff%22/><path d=%22M30 35h40v25H45L30 75V35z%22 fill=%22white%22/></svg>">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <script src="https://www.gstatic.com/firebasejs/9.17.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.17.1/firebase-database-compat.js"></script>
    <style>
        /* --- ESTILOS BASE --- */
        * { box-sizing: border-box; } 
        html, body { 
            height: 100%; 
            margin: 0; 
            padding: 0; 
            background: radial-gradient(circle at center, #1a1a20 0%, #0f0f12 100%);
            color: white;
            font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            -webkit-overflow-scrolling: touch;
            /* Permite scroll vertical para actualizar pero bloquea el "baile" lateral */
            overflow-x: hidden;
            overflow-y: auto;
            overscroll-behavior-y: contain; 
        }

        /* --- CONTENEDORES --- */
        #login, #contacts-container, #chat-container {
            display: none;
            width: 100%;
            max-width: 100vw; 
        }

        /* Login totalmente fijo */
        #login { 
            height: 100vh; 
            display: flex; 
            flex-direction: column; 
            justify-content: center; 
            align-items: center; 
            gap: 25px; 
            text-align: center;
            overflow: hidden; 
        }
        
        #contacts-container, #chat-container { 
            flex-direction: column; 
            min-height: 100vh;
        }

        .login-box { width: 85%; max-width: 380px; padding: 40px; background: rgba(26, 26, 32, 0.8); border: 1px solid rgba(255, 255, 255, 0.05); border-radius: 30px; box-shadow: 0 20px 40px rgba(0, 0, 0, 0.4); backdrop-filter: blur(10px); }

        #username { width: 100%; text-align: center; padding: 14px 20px; border-radius: 15px; border: 2px solid #2c2c34; background: #0f0f12; color: white; font-size: 16px; margin-bottom: 20px; }
        #login-btn { width: 100%; padding: 14px; background: #007bff; color: white; border: none; border-radius: 15px; font-weight: 700; cursor: pointer; }

        /* --- HEADER --- */
        .header { 
            height: 65px; 
            display: flex; 
            justify-content: space-between; 
            align-items: center; 
            padding: 0 15px; 
            background: #1a1a20; 
            border-bottom: 1px solid #333; 
            position: sticky; 
            top: 0; 
            z-index: 1000;
        }

        /* --- MENSAJES --- */
        #messages { 
            flex: 1;
            /* Ajuste para que el último mensaje no quede bajo el footer fijo */
            padding: 15px 0 85px 0; 
            display: flex;
            flex-direction: column;
            overflow-y: auto;
        }

        .msg-container { display: flex; width: 100%; padding: 2px 15px; margin-bottom: 8px; }
        .msg-container.me { justify-content: flex-end; }
        .msg-container.other { justify-content: flex-start; }

        .msg { padding: 8px 12px; border-radius: 15px; max-width: 85%; position: relative; display: inline-block; word-wrap: break-word; }
        .msg.me { background: #007bff; border-bottom-right-radius: 2px; color: white; }
        .msg.other { background: #2c2c34; border-bottom-left-radius: 2px; color: white; }

        /* --- FOOTER FIJO PRO --- */
        .input-area { 
            height: 70px;
            padding: 10px 12px;
            background: #1a1a20; 
            display: flex; 
            gap: 10px; 
            align-items: center; 
            border-top: 1px solid #333;
            position: fixed; /* Fijo para que no desaparezca al escribir */
            bottom: 0;
            left: 0;
            right: 0;
            z-index: 1000;
        }

        textarea#msg-input { flex: 1; padding: 10px 15px; border-radius: 22px; border: none; background: #2c2c34; color: white; outline: none; resize: none; font-size: 16px; max-height: 50px; }
        .footer-btn { background: transparent; border: none; color: #007bff; font-size: 1.3rem; cursor: pointer; display: flex; align-items: center; min-width: 30px; }
        button#main-btn { width: 42px; height: 42px; background: #007bff; color: white; border: none; border-radius: 50%; display: flex; align-items: center; justify-content: center; }

        /* --- REACCIONES Y EMOJIS (10) --- */
        #reaction-selector { 
            display: none; 
            position: fixed; 
            background: #1a1a20; 
            border: 1px solid #333; 
            padding: 10px; 
            border-radius: 15px; 
            z-index: 2000; 
            grid-template-columns: repeat(5, 1fr); 
            gap: 12px;
            box-shadow: 0 5px 25px rgba(0,0,0,0.9); 
        }
        .emoji-item { cursor: pointer; font-size: 1.3rem; text-align: center; }
        .emoji-picker { display: none; position: absolute; bottom: 80px; left: 10px; background: #1a1a20; border: 1px solid #333; padding: 10px; border-radius: 15px; grid-template-columns: repeat(5, 1fr); gap: 8px; z-index: 1100; }

        /* --- EXTRAS --- */
        .status-info { display: flex; align-items: center; justify-content: flex-end; gap: 4px; margin-top: 4px; font-size: 10px; opacity: 0.7; }
        .btn-header { background: transparent; color: #007bff; border: 1px solid #007bff; padding: 6px 10px; border-radius: 8px; font-size: 14px; }
        .contact-card { background: #1a1a20; padding: 15px; margin: 10px; border-radius: 12px; border: 1px solid #333; display: flex; align-items: center; justify-content: space-between; }
        .unread-badge { background: #007bff; color: white; font-size: 10px; padding: 2px 7px; border-radius: 10px; }
        .online-dot { height: 10px; width: 10px; border-radius: 50%; display: inline-block; }
        .dot-online { background-color: #2ecc71; }
        .dot-offline { background-color: #ff4444; }
        #scroll-down { position: fixed; bottom: 85px; right: 20px; background: #007bff; color: white; width: 35px; height: 35px; border-radius: 50%; display: none; align-items: center; justify-content: center; border: none; z-index: 900; }
        .recording { color: #ff4444 !important; animation: pulse 1s infinite; }
        @keyframes pulse { 0% { opacity: 1; } 50% { opacity: 0.5; } 100% { opacity: 1; } }
    </style>
</head>
<body onclick="cerrarSelectores()">

    <div id="login">
        <div class="login-box">
            <i class="fas fa-comments" style="font-size: 4.5rem; color: #007bff;"></i>
            <h1 style="color: #007bff; font-size: 2.5rem; margin: 10px 0;">UrriChat</h1>
            <input type="text" id="username" placeholder="Usuario..." autocomplete="off">
            <button id="login-btn" onclick="registrarUsuario()">Conectar <i class="fas fa-arrow-right"></i></button>
        </div>
    </div>

    <div id="contacts-container">
        <div class="header">
            <span id="mi-perfil" style="font-weight: bold; color: #2ecc71;"></span>
            <div style="display: flex; gap: 8px;">
                <button class="btn-header" onclick="editarNombre()"><i class="fas fa-user-edit"></i></button>
                <button class="btn-header" style="color:#ff4444; border-color:#ff4444" onclick="confirmarSalida()"><i class="fas fa-sign-out-alt"></i></button>
            </div>
        </div>
        <div id="lista-usuarios">
            <div class="contact-card" onclick="abrirChat('muro', 'Chat Grupal')" style="border-left: 5px solid #007bff;">
                <span><i class="fas fa-users" style="margin-right: 10px; color: #007bff;"></i> Chat Grupal</span>
                <span id="badge-muro"></span>
            </div>
            <div id="usuarios-conectados"></div>
        </div>
    </div>

    <div id="chat-container">
        <div class="header">
            <button class="btn-header" onclick="volverAContactos()"><i class="fas fa-chevron-left"></i></button>
            <span id="chat-title" style="font-weight: bold;">Chat</span>
            <button class="btn-header" style="color:#ff4444; border-color:#ff4444" onclick="vaciarChat()"><i class="fas fa-trash-alt"></i></button>
        </div>

        <div id="messages" onscroll="handleScroll(this)"></div>
        <button id="scroll-down" onclick="scrollToBottom()"><i class="fas fa-chevron-down"></i></button>

        <div class="input-area">
            <div id="emoji-picker" class="emoji-picker" onclick="event.stopPropagation()">
                <span class="emoji-item" onclick="addEmoji('😊')">😊</span>
                <span class="emoji-item" onclick="addEmoji('😂')">😂</span>
                <span class="emoji-item" onclick="addEmoji('❤️')">❤️</span>
                <span class="emoji-item" onclick="addEmoji('👍')">👍</span>
                <span class="emoji-item" onclick="addEmoji('🔥')">🔥</span>
                <span class="emoji-item" onclick="addEmoji('😮')">😮</span>
                <span class="emoji-item" onclick="addEmoji('😢')">😢</span>
                <span class="emoji-item" onclick="addEmoji('👏')">👏</span>
                <span class="emoji-item" onclick="addEmoji('😎')">😎</span>
                <span class="emoji-item" onclick="addEmoji('🎉')">🎉</span>
            </div>
            <button class="footer-btn" onclick="toggleEmojiPicker(event)"><i class="far fa-smile"></i></button>
            <input type="file" id="file-input" style="display:none" onchange="enviarArchivo(this)">
            <button class="footer-btn" onclick="document.getElementById('file-input').click()"><i class="fas fa-paperclip"></i></button>
            <button class="footer-btn" id="mic-btn" onclick="toggleAudio()"><i class="fas fa-microphone"></i></button>
            <textarea id="msg-input" placeholder="Mensaje..." rows="1" oninput="autoResize(this)" onkeydown="checkEnter(event)"></textarea>
            <button id="main-btn" onclick="enviar()"><i class="fas fa-paper-plane"></i></button>
        </div>
    </div>

    <div id="reaction-selector" onclick="event.stopPropagation()">
        <span class="emoji-item" onclick="aplicarReaccion('😊')">😊</span>
        <span class="emoji-item" onclick="aplicarReaccion('😂')">😂</span>
        <span class="emoji-item" onclick="aplicarReaccion('❤️')">❤️</span>
        <span class="emoji-item" onclick="aplicarReaccion('👍')">👍</span>
        <span class="emoji-item" onclick="aplicarReaccion('🔥')">🔥</span>
        <span class="emoji-item" onclick="aplicarReaccion('😮')">😮</span>
        <span class="emoji-item" onclick="aplicarReaccion('😢')">😢</span>
        <span class="emoji-item" onclick="aplicarReaccion('👏')">👏</span>
        <span class="emoji-item" onclick="aplicarReaccion('😎')">😎</span>
        <span class="emoji-item" onclick="aplicarReaccion('🎉')">🎉</span>
    </div>

    <script>
        const firebaseConfig = {
            apiKey: "AIzaSyA7XKmn8f1w6hAVUZaS8Eui7FAnZRy0Myg",
            authDomain: "urrichatapp.firebaseapp.com",
            databaseURL: "https://urrichatapp-default-rtdb.firebaseio.com",
            projectId: "urrichatapp",
            storageBucket: "urrichatapp.firebasestorage.app",
            messagingSenderId: "504734750650",
            appId: "1:504734750650:web:51a8def62934aabbeb2f83"
        };
        firebase.initializeApp(firebaseConfig);
        const db = firebase.database();
        let usuarioActual = "", salaActual = "", msgIdParaReaccionar = "", mediaRecorder, audioChunks = [], isRecording = false;

        function registrarUsuario(p) {
            let user = p || document.getElementById('username').value.trim();
            if (!user) return;
            usuarioActual = user;
            localStorage.setItem('urrichat_user', user);
            localStorage.setItem('urrichat_active', 'true');
            db.ref("usuarios/" + user).set("online");
            db.ref("usuarios/" + user).onDisconnect().set("offline");
            document.getElementById('login').style.display = 'none';
            document.getElementById('mi-perfil').innerText = "● " + user;
            escucharUsuarios();
            const last = localStorage.getItem('urrichat_last_room');
            if (last && last !== "contacts") abrirChat(last, localStorage.getItem('urrichat_last_title'));
            else document.getElementById('contacts-container').style.display = 'flex';
        }

        function escucharUsuarios() {
            db.ref("usuarios").on("value", (snap) => {
                const list = document.getElementById("usuarios-conectados");
                list.innerHTML = "";
                snap.forEach((child) => {
                    if (child.key !== usuarioActual) {
                        const salaID = "privado_" + [usuarioActual, child.key].sort().join("_");
                        const card = document.createElement("div");
                        card.className = "contact-card";
                        card.innerHTML = `<span>${child.key}</span><span class="online-dot ${child.val()==='online'?'dot-online':'dot-offline'}"></span>`;
                        card.onclick = () => abrirChat(salaID, child.key);
                        list.appendChild(card);
                    }
                });
            });
        }

        function abrirChat(id, title) {
            salaActual = id;
            localStorage.setItem('urrichat_last_room', id);
            localStorage.setItem('urrichat_last_title', title);
            document.getElementById('contacts-container').style.display = 'none';
            document.getElementById('chat-container').style.display = 'flex';
            document.getElementById('chat-title').innerText = title;
            escucharMensajes();
        }

        function escucharMensajes() {
            db.ref(salaActual).off();
            db.ref(salaActual).on("value", (snap) => {
                const box = document.getElementById("messages");
                let html = "";
                snap.forEach(child => {
                    const d = child.val();
                    const esMio = d.u === usuarioActual;
                    if(!esMio && !d.r) db.ref(`${salaActual}/${child.key}/r`).set(true);
                    let content = d.t ? `<span>${d.t}</span>` : "";
                    if(d.file) {
                        if(d.fileType?.includes("image")) content += `<img src="${d.file}" style="max-width:100%; border-radius:10px;">`;
                        else if(d.fileType?.includes("audio")) content += `<audio controls src="${d.file}" style="width:180px;"></audio>`;
                        else content += `<a href="${d.file}" style="color:white">Archivo</a>`;
                    }
                    if(d.reacciones) {
                        content += `<div style="display:flex;gap:3px;margin-top:5px">`;
                        for(let e in d.reacciones) content += `<span style="background:rgba(0,0,0,0.2);padding:2px 5px;border-radius:10px;font-size:11px">${e} ${d.reacciones[e]}</span>`;
                        content += `</div>`;
                    }
                    html += `<div class="msg-container ${esMio?'me':'other'}">
                        <div class="msg ${esMio?'me':'other'}" ondblclick="reaccionar(event,'${child.key}')">
                            ${!esMio?'<small style="color:#888;display:block">'+d.u+'</small>':''}
                            ${content}
                            <div class="status-info">${d.h} ${esMio?(d.r?'<i class="fas fa-check-double" style="color:#88ccff"></i>':'<i class="fas fa-check"></i>'):''}</div>
                        </div>
                    </div>`;
                });
                box.innerHTML = html;
                scrollToBottom();
            });
        }

        function enviar() {
            const i = document.getElementById('msg-input');
            if (i.value.trim() && salaActual) {
                const h = new Date().getHours() + ":" + new Date().getMinutes().toString().padStart(2,'0');
                db.ref(salaActual).push({ u: usuarioActual, t: i.value, h: h, r: false });
                i.value = ""; i.style.height = 'auto';
            }
        }

        function reaccionar(e, id) { e.stopPropagation(); msgIdParaReaccionar = id; const s = document.getElementById('reaction-selector'); s.style.display = 'grid'; s.style.top = (e.clientY-50)+'px'; s.style.left = '50px'; }
        function aplicarReaccion(emoji) { db.ref(`${salaActual}/${msgIdParaReaccionar}/reacciones/${emoji}`).transaction(v => (v || 0) + 1); cerrarSelectores(); }
        function toggleEmojiPicker(e) { e.stopPropagation(); const p = document.getElementById('emoji-picker'); p.style.display = p.style.display==='grid'?'none':'grid'; }
        function addEmoji(e) { document.getElementById('msg-input').value += e; cerrarSelectores(); }
        function cerrarSelectores() { document.getElementById('emoji-picker').style.display = 'none'; document.getElementById('reaction-selector').style.display = 'none'; }
        function autoResize(t) { t.style.height = 'auto'; t.style.height = t.scrollHeight + 'px'; }
        function checkEnter(e) { if(e.key === "Enter" && !e.shiftKey) { e.preventDefault(); enviar(); } }
        function volverAContactos() { salaActual = ""; localStorage.setItem('urrichat_last_room', 'contacts'); document.getElementById('chat-container').style.display = 'none'; document.getElementById('contacts-container').style.display = 'flex'; }
        function scrollToBottom() { const b = document.getElementById("messages"); b.scrollTop = b.scrollHeight; }
        function handleScroll(el) { document.getElementById('scroll-down').style.display = (el.scrollHeight - el.scrollTop > el.clientHeight + 100) ? 'flex' : 'none'; }
        function vaciarChat() { if(confirm("¿Vaciar chat?")) db.ref(salaActual).remove(); }
        
        function confirmarSalida() { 
            if(confirm("¿Cerrar sesión?")) { 
                db.ref("usuarios/"+usuarioActual).set("offline"); 
                localStorage.removeItem('urrichat_active'); 
                localStorage.removeItem('urrichat_last_room');
                location.reload(); 
            } 
        }

        function editarNombre() { let n = prompt("Nuevo nombre:", usuarioActual); if(n) { db.ref("usuarios/"+usuarioActual).set("offline"); usuarioActual = n; localStorage.setItem('urrichat_user', n); db.ref("usuarios/"+n).set("online"); location.reload(); } }
        
        async function toggleAudio() {
            const btn = document.getElementById('mic-btn');
            if (!isRecording) {
                const stream = await navigator.mediaDevices.getUserMedia({ audio: true });
                mediaRecorder = new MediaRecorder(stream);
                audioChunks = [];
                mediaRecorder.ondataavailable = e => audioChunks.push(e.data);
                mediaRecorder.onstop = () => {
                    const reader = new FileReader();
                    reader.readAsDataURL(new Blob(audioChunks));
                    reader.onloadend = () => {
                        const h = new Date().getHours() + ":" + new Date().getMinutes().toString().padStart(2,'0');
                        db.ref(salaActual).push({ u: usuarioActual, file: reader.result, fileType: 'audio', h: h, r: false });
                    };
                };
                mediaRecorder.start(); isRecording = true; btn.classList.add('recording');
            } else { mediaRecorder.stop(); isRecording = false; btn.classList.remove('recording'); }
        }

        function enviarArchivo(input) {
            const file = input.files[0];
            const reader = new FileReader();
            reader.readAsDataURL(file);
            reader.onload = () => {
                const h = new Date().getHours() + ":" + new Date().getMinutes().toString().padStart(2,'0');
                db.ref(salaActual).push({ u: usuarioActual, file: reader.result, fileType: file.type, h: h, r: false });
            };
        }

        window.onload = () => { 
            const savedUser = localStorage.getItem('urrichat_user');
            const isActive = localStorage.getItem('urrichat_active');
            if(savedUser) {
                document.getElementById('username').value = savedUser;
                if(isActive) registrarUsuario(savedUser);
            }
        };
    </script>
</body>
</html>
